<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Fondo verde -->
  <rect width="1200" height="630" fill="#055160"/>

  <!-- Logo Zehnder (imagen externa) -->
  <image href="https://drive.google.com/thumbnail?id=1MoHYMjw6omiogzOWucmQ2ojAb4vxoVYN&sz=w400" x="80" y="165" width="260" height="260" preserveAspectRatio="xMidYMid meet"/>

  <!-- Línea separadora vertical -->
  <rect x="400" y="140" width="3" height="320" fill="rgba(255,255,255,0.25)" rx="2"/>

  <!-- Texto principal -->
  <text x="440" y="260" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Zehnder</text>
  <text x="440" y="345" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Service Norte</text>

  <!-- Subtítulo -->
  <text x="440" y="415" font-family="Arial, sans-serif" font-size="34" fill="#d6f0ee">Tu portal de filtros y mantenimiento.</text>
  <text x="440" y="460" font-family="Arial, sans-serif" font-size="34" fill="#d6f0ee">Todo en un solo lugar.</text>
</svg>
